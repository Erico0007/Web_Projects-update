<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-translate="Reset Password | SYSTEMSTORES">
      Réinitialiser le mot de passe | SYSTEMSTORES
    </title>
    <link rel="stylesheet" href="../styles/style.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <div class="language-switcher">
    <a href="ResetPassword.html">English</a>
    <a href="ResetPassword(French).html">Français</a>
  </div>

  <body>
    <main class="container mt-5">
      <h2 data-translate="Reset Your Password">Réinitialisez votre mot de passe</h2>

      <form id="resetPasswordForm">
        <div class="mb-3">
          <label
            for="newPassword"
            class="form-label"
            data-translate="New Password"
          >
            Nouveau mot de passe
          </label>

          <input
            type="password"
            class="form-control"
            id="newPassword"
            required
            minlength="8"
            placeholder="Entrez le nouveau mot de passe"
            data-translate="Enter new password"
          />
        </div>

        <div class="mb-3">
          <label
            for="confirmPassword"
            class="form-label"
            data-translate="Confirm Password"
          >
            Confirmez le mot de passe
          </label>

          <input
            type="password"
            class="form-control"
            id="confirmPassword"
            required
            minlength="8"
            placeholder="Confirmez le nouveau mot de passe"
            data-translate="Confirm new password"
          />
        </div>

        <button
          type="submit"
          class="btn btn-success"
          data-translate="Reset Password"
        >
          Réinitialiser le mot de passe
        </button>
      </form>

      <div
        id="message"
        class="mt-3"
        data-translate="Password reset message"
      ></div>
    </main>

    <footer>
      <p data-translate="© 2025 SYSTEMSTORES. All rights reserved.">
        &copy; 2025 SYSTEMSTORES. Tous droits réservés.
      </p>

      <div class="language-switcher">
        <button
          type="button"
          class="lang-btn active"
          data-lang="en"
          data-translate="English"
        >
          English
        </button>

        <button
          type="button"
          class="lang-btn active"
          data-lang="fr"
          data-translate="Français"
        >
          Français
        </button>
      </div>
    </footer>

    <script src="../Script/ResetPassword.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../Script/lang.js"></script>
  </body>
</html>
