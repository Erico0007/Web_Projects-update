<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title data-translate="Forgot Password | SYSTEMSTORES">Mot de passe oublié | SYSTEMSTORES</title>

  <link rel="stylesheet" href="../styles/style.css" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>

<div class="language-switcher">
  <a href="ForgotPassword.html">English</a>
  <a href="ForgotPassword(French).html">Français</a>
</div>

<body>
  <main class="container mt-5">
    <h2 data-translate="Forgot Password">Mot de passe oublié</h2>

    <form id="forgotPasswordForm">
      <div class="mb-3">
        <label for="email" class="form-label" data-translate="Enter your registered email">
          Entrez votre adresse courriel enregistrée
        </label>

        <input
          type="email"
          class="form-control"
          id="email"
          required
          placeholder="Entrez votre adresse courriel"
          data-translate="Enter your email"
        />
      </div>

      <button type="submit" class="btn btn-primary" data-translate="Send Reset Link">
        Envoyer le lien de réinitialisation
      </button>
    </form>

    <div id="message" class="mt-3" data-translate="Reset link sent successfully.">
      <!-- Message affiché après envoi -->
    </div>
  </main>

  <footer>
    <p data-translate="© 2025 SYSTEMSTORES. All rights reserved.">
      &copy; 2025 SYSTEMSTORES. Tous droits réservés.
    </p>
    </div>
  </footer>

  <script src="../Script/ForgotPassword.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../Script/lang.js"></script>
</body>
</html>
